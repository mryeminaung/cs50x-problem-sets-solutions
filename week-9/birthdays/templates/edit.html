<!DOCTYPE html>

<html lang="en">

<head>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500&display=swap" rel="stylesheet">
    <link href="/static/styles.css" rel="stylesheet">
    <title>Edit Birthday For {{birthday.id}}</title>
</head>

<body>
    <div class="header">
        <h1>Birthdays</h1>
    </div>
    <div class="container">
        <div class="section">
            <h2>Edit a Birthday</h2>
            <form action="{{ url_for('edit', birthdayId=birthday.id) }}" autocomplete="off" method="POST">
                <input value="{{ birthday.name }}" type="text" name="name" placeholder="Name" />
                <input value="{{ birthday.month }}" type="text" name="month" placeholder="Month" />
                <input value="{{ birthday.day }}" type="text" name="day" placeholder="Day" />
                <button type="submit">Update Birthday</button>
            </form>
        </div>
    </div>
</body>

</html>
